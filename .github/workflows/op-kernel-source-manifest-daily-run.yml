name: "Op Kernel Source Manifest Daily Update"

# Regenerates `aic-core/src/aiconfigurator_core/systems/op_kernel_source_manifest.yaml` from
# the perf data tree on a schedule and opens an automated PR if the committed
# file has drifted. Mirrors the support-matrix daily-run pattern: developers
# don't regenerate the manifest themselves on every data PR — the daily job
# folds drift back in.
#
# Manual runs: trigger via workflow_dispatch (optionally targeting a non-default
# branch).

on:
  schedule:
    # 7 AM PT / 2 PM UTC, same slot as the support matrix daily run.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: "Target branch to run against (defaults to repo default branch)."
        required: false
        type: string
        default: ""

jobs:
  update-manifest:
    name: Regenerate op_kernel_source_manifest.yaml
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    env:
      TARGET_BRANCH: ${{ inputs.branch != '' && inputs.branch || github.event.repository.default_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          lfs: true

      - name: Git LFS Pull
        run: git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install audit script dependencies
        run: pip install "tqdm>=4.0.0"

      - name: Regenerate manifest
        run: |
          python3 tools/perf_database/audit_kernel_source.py \
            --data-root aic-core/src/aiconfigurator_core/systems/data \
            --out-manifest aic-core/src/aiconfigurator_core/systems/op_kernel_source_manifest.yaml

      - name: Detect drift
        id: drift
        run: |
          if git diff --quiet aic-core/src/aiconfigurator_core/systems/op_kernel_source_manifest.yaml; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Close existing PR if no changes
        if: steps.drift.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE="fix: update op_kernel_source_manifest [${{ env.TARGET_BRANCH }}]"
          EXISTING_PR=$(gh pr list --state open --search "in:title ${PR_TITLE}" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "No changes detected. Closing existing PR #$EXISTING_PR"
            gh pr close "$EXISTING_PR" --comment "Closing: op_kernel_source_manifest is now up to date with ${{ env.TARGET_BRANCH }}"
            git push origin --delete automated/update-op-kernel-source-manifest-${{ env.TARGET_BRANCH }} 2>/dev/null || true
          fi

      - name: Create or Update Pull Request
        if: steps.drift.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          signoff: true
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: "fix: update op_kernel_source_manifest"
          title: "fix: update op_kernel_source_manifest [${{ env.TARGET_BRANCH }}]"
          body: |
            Daily-run regeneration of `aic-core/src/aiconfigurator_core/systems/op_kernel_source_manifest.yaml` from the perf data tree.

            Generated by [workflow run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          branch: automated/update-op-kernel-source-manifest-${{ env.TARGET_BRANCH }}
          base: ${{ env.TARGET_BRANCH }}
          delete-branch: true
          add-paths: |
            aic-core/src/aiconfigurator_core/systems/op_kernel_source_manifest.yaml
          labels: |
            automated
            op-kernel-source-manifest

      - name: Summary
        run: |
          if [ "${{ steps.drift.outputs.has_changes }}" == "true" ]; then
            echo "## Op Kernel Source Manifest" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Changes detected. A PR has been created or updated against \`${{ env.TARGET_BRANCH }}\`." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Op Kernel Source Manifest" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No changes detected. Manifest is up to date with \`${{ env.TARGET_BRANCH }}\`." >> $GITHUB_STEP_SUMMARY
          fi
