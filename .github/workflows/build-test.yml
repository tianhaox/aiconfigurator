name: "Build and Test"

on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:

jobs:
  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install and run cargo-deny
        working-directory: aic-core/rust/aiconfigurator-core
        # Default log level (warn) surfaces "license inferred from file" notes
        # so any crate that may need a [[licenses.clarify]] entry is named.
        # --show-stats prints a per-license usage summary at the end.
        run: |
          cargo-deny --version || cargo install cargo-deny@0.19.0
          cargo-deny --all-features check --show-stats licenses bans

  core-public-api-contract:
    name: aic-core public API contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          lfs: true
          fetch-depth: 0
      - name: Git LFS Pull
        run: git lfs pull
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Test crate without Python embedding
        run: cargo test --workspace --no-default-features
      - name: Install the local wheel and upper compatibility package
        run: |
          python -m pip install uv
          uv sync --extra dev
      - name: Test Python package contracts
        run: |
          uv run pytest -q \
            tests/cross_package/test_core_public_api.py \
            tests/cross_package/test_core_version_contract.py \
            tests/cross_package/test_import_contract.py
      - name: Test crate with Python embedding
        env:
          AIC_REQUIRE_EMBEDDED_ROUND_TRIP: '1'
          PYO3_PYTHON: ${{ github.workspace }}/.venv/bin/python
          PYTHONPATH: ${{ github.workspace }}/aic-core/src:${{ github.workspace }}/.venv/lib/python3.12/site-packages:${{ github.workspace }}/src
        run: cargo test --workspace --all-features

  build-and-test:
    name: Build and Test (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: unit
            paths: tests/unit
            workers: "-n 2"
          - name: e2e
            paths: tests/e2e
            workers: "-n 2"
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          lfs: true
          fetch-depth: 0
      - name: Detect generator golden changes
        id: generator-golden-changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          head_sha="${{ github.sha }}"

          if [ -z "${base_sha}" ] || [[ "${base_sha}" =~ ^0+$ ]]; then
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          changed_files="$(git diff --name-only "${base_sha}" "${head_sha}")"
          echo "Changed files:"
          printf '%s\n' "${changed_files}"

          if printf '%s\n' "${changed_files}" | grep -Eq '^(src/aiconfigurator/generator/|tests/golden/generator/)'; then
            echo "run_golden=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run_golden=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Git LFS Pull
        run: git lfs pull
      - name: Print runner resources
        run: |
          echo "CPU cores: $(nproc)"
          free -h
      - name: Build wheels and verify SDK import namespaces
        run: |
          docker build -f docker/Dockerfile -t aiconfigurator:build --target build .
      - name: Run tests in container
        shell: bash
        run: |
          test_paths=(${{ matrix.suite.paths }})
          if [ "${{ matrix.suite.name }}" = "unit" ] && [ "${{ steps.generator-golden-changes.outputs.run_golden }}" = "true" ]; then
            test_paths+=(tests/golden/generator)
          fi
          echo "Running pytest paths: ${test_paths[*]}"

          docker build -f docker/Dockerfile -t aiconfigurator:test --target test .
          # Fail-closed loader provenance checks (Collector V3 design §7.4); the
          # committed data tree is fully sidecar-covered post-PR3, so this must stay green.
          docker run --name aic -e AIC_STRICT_PROVENANCE=1 aiconfigurator:test \
            pytest \
            "${test_paths[@]}" \
            -m "unit or build" \
            -v --tb=short --maxfail=1 --timeout=600 \
            ${{ matrix.suite.workers }} \
            --md-report --md-report-verbose=1 --md-report-flavor gfm --md-report-output test_report.md
      - name: Copy test report from test Container
        if: always()
        run: |
            docker cp aic:/workspace/test_report.md ./test_report.md


  rust-engine-step-parity:
    name: Rust/Python engine-step parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          lfs: true
          fetch-depth: 0
      - name: Git LFS Pull
        # The parity suite reads the collected perf parquet tables under
        # aic-core/src/aiconfigurator_core/systems/data (stored via Git LFS).
        run: git lfs pull
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Install AIC and test dependencies
        run: |
          python -m pip install uv
          uv sync --extra dev
          uv pip install --python .venv/bin/python maturin
      - name: Build the aiconfigurator_core Rust extension
        # The AICONFIGURATOR_RUST_CORE_AUTOBUILD env var is a no-op; the compiled
        # aiconfigurator_core extension must be built explicitly with maturin so
        # the parity suite exercises the current Rust source. The Maturin project
        # is the standalone core wheel under aic-core.
        run: |
          cd aic-core
          VIRTUAL_ENV="${GITHUB_WORKSPACE}/.venv" \
            "${GITHUB_WORKSPACE}/.venv/bin/maturin" develop --release
      - name: Run Rust unit tests (cargo test)
        # The crate's own oracle/unit tests were previously NOT in any gate,
        # which let "match Python" pins go stale silently (e.g. the b200
        # mem_bw test survived a YAML correction unnoticed). The py:: binding
        # tests self-initialize the interpreter (prepare_freethreaded_python),
        # so plain `cargo test --lib` covers them; PYO3_PYTHON pins the venv
        # interpreter for linking.
        env:
          PYO3_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: cargo test --release --lib
      - name: Run Rust/Python engine-step parity suite
        run: |
          "${GITHUB_WORKSPACE}/.venv/bin/pytest" -q -rx \
            aic-core/rust/aiconfigurator-core/parity_tests/test_engine_step_parity.py
      - name: Run compile-engine (EngineHandle) parity suite
        # Parity for the compile_engine -> EngineHandle path: op-transfer bincode
        # round-trip fidelity plus integration parity vs the Python BaseBackend.
        run: |
          "${GITHUB_WORKSPACE}/.venv/bin/pytest" -q -rx \
            aic-core/rust/aiconfigurator-core/parity_tests/test_compile_engine_parity.py
      - name: Run Rust/Python engine-step perf gate
        # Guards against Rust hot-path perf regressions (e.g. an O(n log n)
        # per-query resolve). Compares Rust-vs-Python p50 back-to-back on the
        # SAME runner, so the ratio largely cancels absolute machine speed;
        # floors are generous (see the test's docstring) so runner noise never
        # fails a healthy build. Pin BLAS threads so the Python side's p50 is
        # stable on BLAS-backed runners (matches the benchmark docs).
        env:
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
        run: |
          "${GITHUB_WORKSPACE}/.venv/bin/pytest" -q -rA \
            aic-core/rust/aiconfigurator-core/parity_tests/test_engine_step_perf.py
