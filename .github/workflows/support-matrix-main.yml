name: "Support Matrix Update (Main)"

on:
  workflow_dispatch: # Allow manual trigger (with no inputs)
  workflow_call:
    inputs:
      branch:
        description: "Target branch to run against"
        required: true
        type: string

jobs:
  update-support-matrix:
    name: Update Support Matrix
    runs-on: prod-aiconfigurator-default-amd64-v1
    timeout-minutes: 480 # 8 hours
    permissions:
      contents: write
      pull-requests: write
    env:
      TARGET_BRANCH: ${{ inputs.branch || github.ref_name }}
      SUPPORT_MATRIX_DOCKER_MEMORY_LIMIT: ${{ vars.SUPPORT_MATRIX_DOCKER_MEMORY_LIMIT || '24g' }}
    steps:
      - name: Clean workspace
        run: |
          rm -rf ${{ github.workspace }}/*
          rm -rf ${{ github.workspace }}/.[!.]*

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          lfs: true

      - name: Git LFS Pull
        run: git lfs pull

      - name: Build container
        run: |
          docker build -f docker/Dockerfile -t aiconfigurator:matrix --target test .

      - name: Backup old support matrix
        run: |
          rm -rf aic-core/src/aiconfigurator_core/systems/support_matrix_old
          cp -R aic-core/src/aiconfigurator_core/systems/support_matrix aic-core/src/aiconfigurator_core/systems/support_matrix_old

      - name: Generate new support matrix
        run: |
          docker run --rm \
            --memory "${SUPPORT_MATRIX_DOCKER_MEMORY_LIMIT}" \
            -v ${{ github.workspace }}/aic-core/src/aiconfigurator_core/systems:/app/src/aiconfigurator/systems \
            aiconfigurator:matrix \
            python3 tools/support_matrix/generate_support_matrix.py \
              --output /app/src/aiconfigurator/systems/support_matrix

      - name: Compare support matrices
        id: compare
        run: |
          mkdir -p diff_output

          set +e
          docker run --rm \
            --memory "${SUPPORT_MATRIX_DOCKER_MEMORY_LIMIT}" \
            -v ${{ github.workspace }}/aic-core/src/aiconfigurator_core/systems:/app/src/aiconfigurator/systems \
            -v ${{ github.workspace }}/diff_output:/app/diff_output \
            aiconfigurator:matrix \
            python3 tools/support_matrix/compare_support_matrix.py \
              --old /app/src/aiconfigurator/systems/support_matrix_old \
              --new /app/src/aiconfigurator/systems/support_matrix \
              --output-diff /app/diff_output/diff.json
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "needs_pr=false" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "needs_pr=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "needs_pr=false" >> $GITHUB_OUTPUT
            echo "::error::Validation errors detected in support matrix"
            exit 1
          fi

      - name: Cleanup old support matrix backup
        run: |
          rm -rf aic-core/src/aiconfigurator_core/systems/support_matrix_old

      - name: Extract PR description
        if: steps.compare.outputs.needs_pr == 'true'
        run: |
          echo "Updated by [workflow run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" > pr_body.md
          echo "" >> pr_body.md
          cat diff_output/diff.json | jq -r '.pr_description' >> pr_body.md
          rm -rf diff_output

      - name: Close existing PR if no changes
        if: steps.compare.outputs.needs_pr == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE="fix: update support matrix [${{ env.TARGET_BRANCH }}]"
          EXISTING_PR=$(gh pr list --state open --search "in:title ${PR_TITLE}" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "No changes detected. Closing existing PR #$EXISTING_PR"
            gh pr close "$EXISTING_PR" --comment "Closing: support matrix is now up to date with ${{ env.TARGET_BRANCH }}"
            git push origin --delete automated/update-support-matrix-${{ env.TARGET_BRANCH }} 2>/dev/null || true
          fi

      - name: Create or Update Pull Request
        if: steps.compare.outputs.needs_pr == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          signoff: true
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: "fix: update support matrix"
          title: "fix: update support matrix [${{ env.TARGET_BRANCH }}]"
          body-path: pr_body.md
          branch: automated/update-support-matrix-${{ env.TARGET_BRANCH }}
          base: ${{ env.TARGET_BRANCH }}
          delete-branch: true
          add-paths: |
            aic-core/src/aiconfigurator_core/systems/support_matrix
          labels: |
            automated
            support-matrix

      - name: Summary
        run: |
          if [ "${{ steps.compare.outputs.has_changes }}" == "true" ]; then
            echo "## Support Matrix Update" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Changes detected in support matrix. A PR has been created or updated." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Support Matrix Update" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No changes detected. Support matrix is up to date. Any existing PR has been closed." >> $GITHUB_STEP_SUMMARY
          fi
