  - {framework: sglang, kernel_source: fused_recurrent_gated_delta_rule, backend: fla_triton, source: "sglang/srt/layers/attention/fla (triton)"}
  - {framework: sglang, kernel_source: deep_gemm.fp8_paged_mqa_logits, backend: deepgemm, source: "collector/sglang/deepseekv4_sparse_modules.py"}

