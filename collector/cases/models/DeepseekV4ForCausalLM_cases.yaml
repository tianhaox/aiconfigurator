all_frameworks_op_cases:
  moe:
    cases: all

framework_specific_op_cases:
  sglang:
    dsv4_csa_context_module:
      cases: all
    dsv4_hca_context_module:
      cases: all
    dsv4_csa_generation_module:
      cases: all
    dsv4_hca_generation_module:
      cases: all
    # topK DELTA calibration: one case per model. The worker reads the
    # already-collected dsv4_csa_*_module_perf.txt in the output dir and benches
    # exactly those (prefix, isl, batch_size) shapes, so it must run AFTER the
    # CSA module ops (guaranteed by registry order: topk_calib is registered
    # after the csa module entries).
    dsv4_csa_topk_calib:
      cases: all
    # Standalone paged_mqa/hca_attn/csa_attn rows are experimental-only: the
    # production SDK has no query call-site for them. Keep their registry
    # entries available for explicit research runs, but do not schedule them in
    # the default model plan.
    mhc_module:
      cases: all
    wideep_moe:
      cases: all
  vllm:
    # These four full-module paths are consumed by the production DSV4 model.
    # Standalone sparse kernels and mHC remain registry-only because their
    # current consumer contract/schedule does not represent vLLM 0.24.0's
    # fused TileLang post->pre+norm and boundary/head calls.
    dsv4_csa_context_module:
      cases: all
    dsv4_hca_context_module:
      cases: all
    dsv4_csa_generation_module:
      cases: all
    dsv4_hca_generation_module:
      cases: all
