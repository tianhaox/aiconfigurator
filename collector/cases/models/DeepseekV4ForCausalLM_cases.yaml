schema_version: 1
architecture: DeepseekV4ForCausalLM
model_path: sgl-project/DeepSeek-V4-Flash-FP8
model_paths:
  - deepseek-ai/DeepSeek-V4-Flash
  - deepseek-ai/DeepSeek-V4-Pro
  - sgl-project/DeepSeek-V4-Flash-FP8
  - sgl-project/DeepSeek-V4-Pro-FP8
include_base: true
base_ops:
  - gemm
description: >
  DeepSeek-V4 model-centric collection plan. DSV4 attention and sparse kernel
  cases use the upstream DeepSeek-V4 op names and can target any listed V4
  model path; shared mHC and MoE cases cover the V4 family.

model_case_values:
  moe:
    - model_path: deepseek-ai/DeepSeek-V4-Flash
      hidden_size: 4096
      inter_size: 2048
      topk: 6
      num_experts: 256
      sglang_moe_swiglu_limit: 10.0
      sglang_moe_scoring_func: sqrtsoftplus
      sglang_moe_routing_method_type: DeepSeekV3
      sglang_moe_routed_scaling_factor: 1.5
      sglang_moe_renormalize: true
      sglang_moe_has_correction_bias: true
      sglang_moe_backends:
        w4a8_mxfp4_mxfp8: {100: flashinfer_mxfp4, 103: flashinfer_mxfp4}
      wideep: true
      framework_quantization:
        sglang:
          allowed_modes:
            - w4a8_mxfp4_mxfp8
        trtllm:
          allowed_modes:
            - w4a8_mxfp4_mxfp8
        vllm:
          # Native-FP4 serving path: DeepseekV4FP8Config -> Mxfp4MoEMethod ->
          # trtllm-gen MXFP4xMXFP8 on the SM100 family (see the base moe_vllm
          # w4a8_mxfp4_mxfp8 entry for the dispatch citations). The label is
          # SM-gated there (min_sm 100 / max_sm_exclusive 120), so SM90 —
          # where vLLM 0.24.0 serves this artifact as Marlin W4A16 — never
          # collects under it; Hopper stays an observed gap in the failure
          # log rather than a mislabeled row.
          allowed_modes:
            - w4a8_mxfp4_mxfp8
    - model_path: sgl-project/DeepSeek-V4-Flash-FP8
      hidden_size: 4096
      inter_size: 2048
      topk: 6
      num_experts: 256
      sglang_moe_swiglu_limit: 10.0
      sglang_moe_scoring_func: sqrtsoftplus
      sglang_moe_routing_method_type: DeepSeekV3
      sglang_moe_routed_scaling_factor: 1.5
      sglang_moe_renormalize: true
      sglang_moe_has_correction_bias: true
      wideep: true
      framework_quantization:
        sglang:
          allowed_modes:
            - fp8_block
        trtllm:
          allowed_modes:
            - fp8_block
        vllm:
          # The artifact config omits expert_dtype and vLLM defaults it to
          # FP4, but vLLM 0.24's DeepSeek-V4 quant config has a native
          # fp8-expert branch — serving works with the documented override
          # `--hf-overrides '{"expert_dtype": "fp8"}'` (models/deepseek_v4/
          # quant_config.py @0.24.0). The benchmark constructs Fp8Config from
          # the label with synthetic weights, matching that serving path.
          allowed_modes:
            - fp8_block
    - model_path: deepseek-ai/DeepSeek-V4-Pro
      hidden_size: 7168
      inter_size: 3072
      topk: 6
      num_experts: 384
      sglang_moe_swiglu_limit: 10.0
      sglang_moe_scoring_func: sqrtsoftplus
      sglang_moe_routing_method_type: DeepSeekV3
      sglang_moe_routed_scaling_factor: 2.5
      sglang_moe_renormalize: true
      sglang_moe_has_correction_bias: true
      sglang_moe_backends:
        w4a8_mxfp4_mxfp8: {100: flashinfer_mxfp4, 103: flashinfer_mxfp4}
      wideep: true
      framework_quantization:
        sglang:
          # Owner decision (2026-07-05): do not collect the native-FP4 Pro
          # artifact as w4a16_mxfp4. The shared SM90 w4a16 backend map is
          # triton (GPT-OSS truth), under which SGLang 0.5.14 constructs plain
          # Fp8MoEMethod for is_fp4_experts and every case fails closed;
          # SM100/103 production scheduling uses the w4a8 TRTLLM-gen path
          # kept below. To restore support, re-add w4a16_mxfp4 here and pin
          # sglang_moe_backends w4a16_mxfp4 {90: flashinfer_mxfp4} (the native
          # cutlass mixed-input path, FlashInfer #3084).
          allowed_modes:
            - w4a8_mxfp4_mxfp8
        trtllm:
          allowed_modes:
            - w4a8_mxfp4_mxfp8
        vllm:
          # See the native Flash note above (same SM100-gated trtllm-gen path).
          allowed_modes:
            - w4a8_mxfp4_mxfp8
    - model_path: sgl-project/DeepSeek-V4-Pro-FP8
      hidden_size: 7168
      inter_size: 3072
      topk: 6
      num_experts: 384
      sglang_moe_swiglu_limit: 10.0
      sglang_moe_scoring_func: sqrtsoftplus
      sglang_moe_routing_method_type: DeepSeekV3
      sglang_moe_routed_scaling_factor: 2.5
      sglang_moe_renormalize: true
      sglang_moe_has_correction_bias: true
      wideep: true
      framework_quantization:
        sglang:
          allowed_modes:
            - fp8_block
        trtllm:
          allowed_modes:
            - fp8_block
        vllm:
          # See the Flash converted-artifact note above (same expert_dtype
          # omission; same `--hf-overrides` serving path).
          allowed_modes:
            - fp8_block
  mhc:
    - model_paths:
        - deepseek-ai/DeepSeek-V4-Flash
        - sgl-project/DeepSeek-V4-Flash-FP8
      hidden_size: 4096
      hc_mult: 4
    - model_paths:
        - deepseek-ai/DeepSeek-V4-Pro
        - sgl-project/DeepSeek-V4-Pro-FP8
      hidden_size: 7168
      hc_mult: 4
  dsv4:
    # Module and calibration output keys cannot distinguish Flash from Pro.
    # Use one canonical full/raw profile instead of silently overwriting one
    # model with the other. Targeted runs still preserve all supported paths.
    default_model_paths:
      - sgl-project/DeepSeek-V4-Flash-FP8
    supported_model_paths:
      - deepseek-ai/DeepSeek-V4-Flash
      - deepseek-ai/DeepSeek-V4-Pro
      - sgl-project/DeepSeek-V4-Flash-FP8
      - sgl-project/DeepSeek-V4-Pro-FP8
    attention_kinds:
      - csa
      - hca
    module_batch_sizes:
