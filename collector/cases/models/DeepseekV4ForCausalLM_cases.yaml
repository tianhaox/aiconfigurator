schema_version: 1
architecture: DeepseekV4ForCausalLM
model_path: sgl-project/DeepSeek-V4-Flash-FP8
model_paths:
  - deepseek-ai/DeepSeek-V4-Flash
  - deepseek-ai/DeepSeek-V4-Pro
  - sgl-project/DeepSeek-V4-Flash-FP8
  - sgl-project/DeepSeek-V4-Pro-FP8
include_base: true
base_ops:
  - gemm
description: >
  DeepSeek-V4 model-centric collection plan. DSV4 attention and sparse kernel
  cases use the upstream DeepSeek-V4 op names and can target any listed V4
  model path; shared mHC and MoE cases cover the V4 family.

model_case_values:
  moe:
    - model_path: deepseek-ai/DeepSeek-V4-Flash
      hidden_size: 4096
      inter_size: 2048
      topk: 6
      num_experts: 256
      wideep: true
      framework_quantization:
        sglang:
          # The pinned SGLang 0.5.10 predates the DeepSeek-V4-specific MXFP4
          # method (added in 0.5.12). Do not run its GPT-OSS method under a
          # DSV4 label; enable this only with a separately validated upgrade.
          allowed_modes: []
        trtllm:
          allowed_modes:
            - w4a8_mxfp4_mxfp8
        vllm:
          # vLLM 0.24.0 selects W4A16 on SM90 but W4A8 on Blackwell for this
          # artifact. The SDK currently requests only W4A8 and its MoE key has
          # no system/backend dimension, so neither label is consumable across
          # platforms yet.
          allowed_modes: []
    - model_path: sgl-project/DeepSeek-V4-Flash-FP8
      hidden_size: 4096
      inter_size: 2048
      topk: 6
      num_experts: 256
      wideep: true
      framework_quantization:
        sglang:
          allowed_modes:
            - fp8_block
        trtllm:
          allowed_modes:
            - fp8_block
        vllm:
          # The artifact config omits expert_dtype and vLLM defaults it to
          # FP4, but vLLM 0.24's DeepSeek-V4 quant config has a native
          # fp8-expert branch — serving works with the documented override
          # `--hf-overrides '{"expert_dtype": "fp8"}'` (models/deepseek_v4/
          # quant_config.py @0.24.0). The benchmark constructs Fp8Config from
          # the label with synthetic weights, matching that serving path.
          allowed_modes:
            - fp8_block
    - model_path: deepseek-ai/DeepSeek-V4-Pro
      hidden_size: 7168
      inter_size: 3072
      topk: 6
      num_experts: 384
      wideep: true
      framework_quantization:
        sglang:
          allowed_modes: []
        trtllm:
          allowed_modes:
            - w4a8_mxfp4_mxfp8
        vllm:
          # See the native Flash consumer-contract note above.
          allowed_modes: []
    - model_path: sgl-project/DeepSeek-V4-Pro-FP8
      hidden_size: 7168
      inter_size: 3072
      topk: 6
      num_experts: 384
      wideep: true
      framework_quantization:
        sglang:
          allowed_modes:
            - fp8_block
        trtllm:
          allowed_modes:
            - fp8_block
        vllm:
          # See the Flash converted-artifact note above (same expert_dtype
          # omission; same `--hf-overrides` serving path).
          allowed_modes:
            - fp8_block
  mhc:
    - model_paths:
        - deepseek-ai/DeepSeek-V4-Flash
        - sgl-project/DeepSeek-V4-Flash-FP8
      hidden_size: 4096
      hc_mult: 4
    - model_paths:
        - deepseek-ai/DeepSeek-V4-Pro
        - sgl-project/DeepSeek-V4-Pro-FP8
      hidden_size: 7168
      hc_mult: 4
  dsv4:
    # Module and calibration output keys cannot distinguish Flash from Pro.
    # Use one canonical full/raw profile instead of silently overwriting one
    # model with the other. Targeted runs still preserve all supported paths.
    default_model_paths:
      - sgl-project/DeepSeek-V4-Flash-FP8
    supported_model_paths:
      - deepseek-ai/DeepSeek-V4-Flash
      - deepseek-ai/DeepSeek-V4-Pro
      - sgl-project/DeepSeek-V4-Flash-FP8
      - sgl-project/DeepSeek-V4-Pro-FP8
    attention_kinds:
      - csa
      - hca
    module_batch_sizes:
      - 1
      - 2
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256
      - 512
      - 1024
    module_sequence_lengths:
