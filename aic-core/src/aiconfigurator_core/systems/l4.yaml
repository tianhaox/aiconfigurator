# Estimate-only system spec for SOL/EMPIRICAL/HYBRID exploration.
# No built-in silicon performance database is provided for this PCIe SKU.

data_dir: data/l4 # relative to systems_dir
gpu:
  mem_bw: 300000000000 # 300GB/s
  mem_bw_empirical_scaling_factor: 0.8 # nonofficial correction based on observations
  mem_empirical_constant_latency: 0.000003 # 3us nonofficial correction based on observations
  mem_capacity: 25769803776 # 24GiB
  bfloat16_tc_flops: 121000000000000 # 121TFLOPS (dense; NVIDIA specs list 242TFLOPS with sparsity)
  int8_tc_flops: 242000000000000 # 242TOPS (dense; NVIDIA specs list 485TOPS with sparsity)
  fp8_tc_flops: 242000000000000 # 242TFLOPS (dense; NVIDIA specs list 485TFLOPS with sparsity)
  power: 72 # Watt
  sm_version: 89

node:
  num_gpus_per_node: 8
  inter_node_bw: 25000000000 # Byte/s per GPU, single direction, assumes 1:1 200Gb/s fabric
  intra_node_bw: 32000000000 # Byte/s per GPU, single direction, PCIe Gen4 x16
  pcie_bw: 32000000000 # Byte/s, single direction, PCIe Gen4 x16
  p2p_latency: 0.00001 # 10us nonofficial correction based on observations

misc:
  nccl_mem:
    1: 0
    2: 358612992 # 342MB
    4: 411041792 # 392MB
    8: 411041792 # 392MB
  other_mem: 3758096384 # 3.5GB safety reserve
  nccl_version: '2.27.3'
