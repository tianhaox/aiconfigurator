<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ── Constants ───────────────────────────────────────────────────────
const REPO = 'ai-dynamo/aiconfigurator';
const SUPPORT_MATRIX_PATHS = [
  'aic-core/src/aiconfigurator_core/systems/support_matrix', // split layout (>= 0.10)
  'src/aiconfigurator/systems/support_matrix',               // pre-split branches
];
const LEGACY_CSV_PATH = 'src/aiconfigurator/systems/support_matrix.csv';
const STATUS_HW_INCOMPATIBLE = 'HW_INCOMPATIBLE';
const STATUS_FRAMEWORK_INCOMPATIBLE = 'FRAMEWORK_INCOMPATIBLE';
const PREFERRED_DEFAULT_SYSTEM = 'b200_sxm';
const SYSTEM_ORDER = [
  'b200',
  'gb200',
  'b300',
  'gb300',
  'rtx_pro_6000',
  'h200',
  'h100',
  'l40s',
  'a100',
  'b60',
  '__other__',
];

function isFrameworkUnsupported(error) {
  if (!error) return false;
  return /\bUnsupported\s+[A-Za-z0-9_ -]*quant mode\b/i.test(String(error));
}

function isHardwareUnsupported(error) {
  if (!error) return true;
  const text = String(error).toLowerCase();
  if (
    text.includes('gpu does not support') ||
    text.includes('hardware is incompatible') ||
    text.includes('hardware-incompatible')
  ) return true;
  if (/\bdoes not support\b.*\brequired by\b/.test(text)) return true;
  return text.includes('does not support model datatype') || text.includes('does not support model dtype');
}

function unsupportedStatusFromError(error) {
  if (isHardwareUnsupported(error)) return 'hw_incompatible';
  if (isFrameworkUnsupported(error)) return 'framework_unsupported';
  return 'fail';
}

function statusDisplayLabel(status) {
  if (status === 'hw_incompatible') return STATUS_HW_INCOMPATIBLE;
  if (status === 'framework_unsupported') return STATUS_FRAMEWORK_INCOMPATIBLE;
  return 'FAIL';
}

function sortSystems(systems) {
  return [...systems].sort((a, b) => {
    const keyA = SYSTEM_ORDER.findIndex(p => a.toLowerCase().startsWith(p));
    const keyB = SYSTEM_ORDER.findIndex(p => b.toLowerCase().startsWith(p));
    const idxA = keyA === -1 ? SYSTEM_ORDER.indexOf('__other__') : keyA;
    const idxB = keyB === -1 ? SYSTEM_ORDER.indexOf('__other__') : keyB;
    if (idxA !== idxB) return idxA - idxB;
    return a.localeCompare(b, undefined, { sensitivity: 'base' });
  });
}

const PHASE_ORDER = { dev: 0, a: 1, b: 2, rc: 3, release: 4, post: 5 };

// ── Version Logic (ported from generate_static_page.py) ────────────
function parseVersionTuple(verStr) {
  if (!verStr) return [0, 0, 0, 0, 0, 0, 0];
  const s = verStr.trim();

  const rcPostMatch = s.match(/^(\d[\d.]*)rc(\d+)[.\-]post[.\-]?(\d+)$/);
  if (rcPostMatch) {
    const parts = rcPostMatch[1].split('.').filter(Boolean).map(Number);
    while (parts.length < 3) parts.push(0);
    return [...parts, PHASE_ORDER.rc, parseInt(rcPostMatch[2]), 1, parseInt(rcPostMatch[3])];
  }

  const rcMatch = s.match(/^(\d[\d.]*)(?:rc|a|b)(\d+)(.*)$/);
  if (rcMatch) {
    const parts = rcMatch[1].split('.').filter(Boolean).map(Number);
    while (parts.length < 3) parts.push(0);
    return [...parts, PHASE_ORDER.rc, parseInt(rcMatch[2]), 0, 0];
  }

  const postMatch = s.match(/^(\d[\d.]*)[.\-]post[.\-]?(\d+)$/);
  if (postMatch) {
    const parts = postMatch[1].split('.').filter(Boolean).map(Number);
    while (parts.length < 3) parts.push(0);
    return [...parts, PHASE_ORDER.post, parseInt(postMatch[2]), 0, 0];
  }

  const parts = [];
  for (const x of s.split('.')) {
    const n = parseInt(x, 10);
    if (isNaN(n)) break;
    parts.push(n);
  }
  while (parts.length < 3) parts.push(0);
  return [...parts, PHASE_ORDER.release, 0, 0, 0];
}

function versionSortKey(verStr) {
  return parseVersionTuple(verStr);
}

function compareVersionTuples(a, b) {
  for (let i = 0; i < 7; i++) {
    if (a[i] !== b[i]) return a[i] - b[i];
  }
  return 0;
}

// ── Error Signature Extraction ──────────────────────────────────────
function extractErrorSignature(errMsg) {
  if (!errMsg) return 'No error message';
  const text = String(errMsg).trim();
  if (!text) return 'No error message';
  const lines = text.replace(/\\n/g, '\n').split('\n').map(l => l.trim()).filter(Boolean);
  for (let i = lines.length - 1; i >= 0; i--) {
    if (/^[A-Za-z][A-Za-z0-9_.]*Error[^:]*:/.test(lines[i]) ||
        /^[A-Za-z][A-Za-z0-9_.]*Exception[^:]*:/.test(lines[i])) {
      return lines[i].substring(0, 500);
    }
  }
  if (lines.length) return lines[lines.length - 1].substring(0, 500);
  return text.substring(0, 500);
}

function shellQuote(value) {
  const text = String(value ?? '');
  if (/^[A-Za-z0-9_./:=@+-]+$/.test(text)) return text;
  return `'${text.replace(/'/g, `'\\''`)}'`;
}

function supportMatrixCliConstraints(model) {
  const lowerModel = String(model || '').toLowerCase();
  const largeModelMarkers = [
    'deepseek',
    'glm-5',
    'kimi',
    'llama-4-maverick',
    'llama-4-scout',
    'minimax',
    'mimo-v2',
    'nemotron-ultra',
  ];
  const sizes = Array.from(lowerModel.matchAll(/(\d+(?:\.\d+)?)b/g), match => Number(match[1]))
    .filter(Number.isFinite);
  const maxSize = sizes.length ? Math.max(...sizes) : null;
  if (maxSize !== null && maxSize < 10) {
    return { totalGpus: '4', ttft: '1500.0', tpot: '50.0' };
  }
  if (maxSize !== null && maxSize < 100 && !largeModelMarkers.some(marker => lowerModel.includes(marker))) {
    return { totalGpus: '32', ttft: '2000.0', tpot: '50.0' };
  }
  return { totalGpus: '128', ttft: '2000000.0', tpot: '50000.0' };
}

function supportMatrixCommand(model, system, backend, version, mode) {
  const constraints = supportMatrixCliConstraints(model);
  return [
    'uv',
    'run',
    'aiconfigurator',
    'cli',
    'default',
    '--model-path', model,
    '--total-gpus', constraints.totalGpus,
    '--system', system,
    '--backend', backend,
    '--backend-version', version,
    '--database-mode', 'SILICON',
    '--isl', '256',
    '--osl', '256',
    '--prefix', '128',
    '--ttft', constraints.ttft,
    '--tpot', constraints.tpot,
    '--top-n', '1',
    '--no-color',
  ].map(shellQuote).join(' ');
}

function rowCommand(row) {
  const command = (row.Command || '').trim();
  if (
    command &&
    !command.startsWith('aiconfigurator cli default') &&
    !command.includes('tools/support_matrix/generate_support_matrix.py')
  ) return command;
  return supportMatrixCommand(row.HuggingFaceID, row.System, row.Backend, row.Version, row.Mode);
}

function rowDetails(row) {
  const errorMsg = (row.ErrMsg || '').trim();
  const lines = [
    `Mode: ${row.Mode}`,
    `Status: ${row.Status}`,
    `Version: ${row.Version}`,
    '',
    'Command:',
    rowCommand(row),
  ];
  if (errorMsg) lines.push('', 'Details:', errorMsg);
  return lines.join('\n');
}

function missingRowDetails(model, system, backend, versions, modeFilter) {
  const latestVersion = versions && versions.length ? versions[versions.length - 1] : 'unknown';
  const mode = modeFilter === 'all' ? 'all' : modeFilter;
  return [
    `Mode: ${mode}`,
    'Status: FAIL',
    `Version: ${latestVersion}`,
    '',
    'Command:',
    supportMatrixCommand(model, system, backend, latestVersion, mode),
    '',
    'Details:',
    'No support-matrix row exists for this model/system/backend cell. Run the command above to check the latest backend version.',
  ].join('\n');
}

// ── Matrix Building Logic ───────────────────────────────────────────
function getLatestSupportedVersion(rows, huggingfaceId, system, backend) {
  const subset = rows.filter(r =>
    r.HuggingFaceID === huggingfaceId && r.System === system && r.Backend === backend
  );
  if (!subset.length) return { version: null, isLatest: false, error: null };

  const versionHasFail = {};
  const versionHasPass = {};
  const versionHasHwIncompatible = {};
  const versionHasFrameworkIncompatible = {};
  const versionErrorMsgs = {};
  const versionDetails = {};

  for (const row of subset) {
    const version = row.Version;
    const status = row.Status;
    const errorMsg = (row.ErrMsg || '').trim() || null;
    const detailMsg = rowDetails(row);

    if (version in versionDetails) {
      if (detailMsg && !versionDetails[version].includes(detailMsg)) {
        versionDetails[version] = `${versionDetails[version]}\n\n---\n\n${detailMsg}`;
      }
    } else {
      versionDetails[version] = detailMsg;
    }

    if (status === 'FAIL') {
      versionHasFail[version] = true;
      if (errorMsg) {
        if (version in versionErrorMsgs) {
          const existing = versionErrorMsgs[version];
          if (existing && existing !== errorMsg) {
            versionErrorMsgs[version] = `${existing} | ${errorMsg}`;
          }
        } else {
          versionErrorMsgs[version] = errorMsg;
        }
      }
    } else if (status === 'PASS') {
      versionHasPass[version] = true;
    } else if (status === STATUS_HW_INCOMPATIBLE) {
      versionHasHwIncompatible[version] = true;
      if (errorMsg) {
        if (version in versionErrorMsgs) {
          const existing = versionErrorMsgs[version];
          if (existing && existing !== errorMsg) {
            versionErrorMsgs[version] = `${existing} | ${errorMsg}`;
          }
        } else {
          versionErrorMsgs[version] = errorMsg;
        }
      }
    } else if (status === STATUS_FRAMEWORK_INCOMPATIBLE) {
      versionHasFrameworkIncompatible[version] = true;
      if (errorMsg) {
        if (version in versionErrorMsgs) {
          const existing = versionErrorMsgs[version];
          if (existing && existing !== errorMsg) {
            versionErrorMsgs[version] = `${existing} | ${errorMsg}`;
          }
        } else {
          versionErrorMsgs[version] = errorMsg;
        }
      }
    }
  }

  if (!Object.keys(versionHasFail).length && !Object.keys(versionHasPass).length && !Object.keys(versionHasHwIncompatible).length && !Object.keys(versionHasFrameworkIncompatible).length) {
    return { version: null, isLatest: false, error: null };
  }

  const testedVersions = [...new Set(rows
    .filter(r => r.System === system && r.Backend === backend && r.Version)
    .map(r => r.Version))]
    .sort((a, b) => compareVersionTuples(versionSortKey(b), versionSortKey(a)));
  const latestVersion = testedVersions[0] || null;
  if (latestVersion && versionHasPass[latestVersion]) {
    return { version: latestVersion, isLatest: true, error: null, detail: versionDetails[latestVersion] || null };
  }
  if (latestVersion && versionHasHwIncompatible[latestVersion] && !versionHasFail[latestVersion]) {
    return {
      version: STATUS_HW_INCOMPATIBLE,
      isLatest: false,
      error: versionErrorMsgs[latestVersion] || 'Hardware is incompatible with model datatype',
      detail: versionDetails[latestVersion] || null,
    };
  }
  if (latestVersion && versionHasFrameworkIncompatible[latestVersion] && !versionHasFail[latestVersion]) {
    return {
      version: STATUS_FRAMEWORK_INCOMPATIBLE,
      isLatest: false,
      error: versionErrorMsgs[latestVersion] || 'Framework version does not support required model feature',
      detail: versionDetails[latestVersion] || null,
    };
  }
  if (latestVersion && versionHasFail[latestVersion]) {
    return {
      version: 'FAIL',
      isLatest: false,
      error: versionErrorMsgs[latestVersion] || 'No error message available',
      detail: versionDetails[latestVersion] || null,
    };
  }

  const passing = Object.keys(versionHasPass)
    .sort((a, b) => compareVersionTuples(versionSortKey(b), versionSortKey(a)));
  if (passing.length) {
    return { version: passing[0], isLatest: false, error: null, detail: versionDetails[passing[0]] || null };
  }

  const allMsgs = [];
  const allDetails = [];
  const failVersions = Object.keys(versionHasFail)
    .sort((a, b) => compareVersionTuples(versionSortKey(b), versionSortKey(a)));
  for (const ver of failVersions) {
    if (versionErrorMsgs[ver]) allMsgs.push(`${ver}: ${versionErrorMsgs[ver]}`);
    if (versionDetails[ver]) allDetails.push(versionDetails[ver]);
  }
  if (allMsgs.length || failVersions.length) {
    return {
      version: 'FAIL',
      isLatest: false,
      error: allMsgs.length ? allMsgs.join(' | ') : 'No error message available',
      detail: allDetails.length ? allDetails.join('\n\n---\n\n') : null,
    };
  }

  const hwVersions = Object.keys(versionHasHwIncompatible)
    .sort((a, b) => compareVersionTuples(versionSortKey(b), versionSortKey(a)));
  const frameworkVersions = Object.keys(versionHasFrameworkIncompatible)
    .sort((a, b) => compareVersionTuples(versionSortKey(b), versionSortKey(a)));
  const frameworkMsgs = [];
  const frameworkDetails = [];
  for (const ver of frameworkVersions) {
    if (versionErrorMsgs[ver]) frameworkMsgs.push(`${ver}: ${versionErrorMsgs[ver]}`);
    if (versionDetails[ver]) frameworkDetails.push(versionDetails[ver]);
  }
  if (frameworkMsgs.length || frameworkVersions.length) {
    return {
      version: STATUS_FRAMEWORK_INCOMPATIBLE,
      isLatest: false,
      error: frameworkMsgs.length ? frameworkMsgs.join(' | ') : 'Framework version does not support required model feature',
      detail: frameworkDetails.length ? frameworkDetails.join('\n\n---\n\n') : null,
    };
  }

  const hwMsgs = [];
  const hwDetails = [];
  for (const ver of hwVersions) {
    if (versionErrorMsgs[ver]) hwMsgs.push(`${ver}: ${versionErrorMsgs[ver]}`);
    if (versionDetails[ver]) hwDetails.push(versionDetails[ver]);
  }
  return {
    version: STATUS_HW_INCOMPATIBLE,
    isLatest: false,
    error: hwMsgs.length ? hwMsgs.join(' | ') : 'Hardware is incompatible with model datatype',
    detail: hwDetails.length ? hwDetails.join('\n\n---\n\n') : null,
  };
}

// Aggregate per-version statuses into a single (model, backend) cell. Each
// cell records which versions pass, partially pass, or fail so the UI can
// show "pass on v1.0, fail on v1.1" instead of a single PASS/FAIL flag.
// Overall status:
//   pass:    every tested framework version fully passes
//   latest_pass_with_older_issues: latest framework version passes, older versions have issues
//   older_pass_only: latest framework version does not pass, but an older version does
//   fail:    every tested version fully fails
//   partial: any mix (includes per-version agg/disagg splits)
//   hw_incompatible: latest tested version is impossible on this GPU
//   framework_unsupported: framework/version does not support required model feature
//   missing: no rows tested for this (model, backend)
function aggregateBackendCell(rows, modelId, system, backend, versions, modeFilter) {
  const passVersions = [];
  const partialVersions = [];
  const failVersions = [];
  const hwVersions = [];
  const frameworkUnsupportedVersions = [];
  const errorEntries = [];
  const detailEntries = [];

  const statusFromResult = (result) => {
    if (result.version === null) return 'missing';
    if (result.version === 'FAIL') {
      return isFrameworkUnsupported(result.error) ? 'framework_unsupported' : 'fail';
    }
    if (result.version === STATUS_FRAMEWORK_INCOMPATIBLE) return 'framework_unsupported';
    if (result.version === STATUS_HW_INCOMPATIBLE) return 'hw_incompatible';
    return 'pass';
  };

  // Per-version status uses the existing agg-vs-disagg split inside
  // `getLatestSupportedVersion`, restricted to one version at a time.
  for (const version of versions) {
    const verRows = rows.filter(r => r.Version === version);
    const { version: v, error, detail } = getLatestSupportedVersion(verRows, modelId, system, backend);
    if (v === null) continue; // missing for this version

    let verStatus = statusFromResult({ version: v, error });
    let verError = verStatus === 'pass' ? null : error;
    let verDetail = detail;

    // Within-version agg/disagg split (only meaningful when viewing "all").
    if (modeFilter === 'all') {
      const aggRows = verRows.filter(r => r.Mode === 'agg');
      const disaggRows = verRows.filter(r => r.Mode === 'disagg');
      const aggResult = aggRows.length
        ? getLatestSupportedVersion(aggRows, modelId, system, backend)
        : { version: null, error: null };
      const disaggResult = disaggRows.length
        ? getLatestSupportedVersion(disaggRows, modelId, system, backend)
        : { version: null, error: null };
      const aggStatus = statusFromResult(aggResult);
      const disaggStatus = statusFromResult(disaggResult);
      const modeStatuses = [aggStatus, disaggStatus].filter(s => s !== 'missing');
      const hasPass = modeStatuses.includes('pass');
      const hasFail = modeStatuses.includes('fail');
      const hasHw = modeStatuses.includes('hw_incompatible');
      const hasFrameworkUnsupported = modeStatuses.includes('framework_unsupported');

      if (hasPass && (hasFail || hasHw || hasFrameworkUnsupported || modeStatuses.length < 2)) {
        verStatus = 'partial';
        if (aggStatus !== 'pass') {
          verError = `[agg ${statusDisplayLabel(aggStatus)}] ${aggResult.error || 'No error message available'}`;
        } else {
          verError = `[disagg ${statusDisplayLabel(disaggStatus)}] ${disaggResult.error || 'No error message available'}`;
        }
        verDetail = [aggResult.detail, disaggResult.detail].filter(Boolean).join('\n\n---\n\n') || verDetail;
      } else if (!hasPass && hasFail) {
        verStatus = 'fail';
        verError = aggStatus === 'fail'
          ? (aggResult.error || 'No error message available')
          : (disaggResult.error || 'No error message available');
        verDetail = [aggResult.detail, disaggResult.detail].filter(Boolean).join('\n\n---\n\n') || verDetail;
      } else if (!hasPass && hasFrameworkUnsupported) {
        verStatus = 'framework_unsupported';
        verError = aggStatus === 'framework_unsupported'
          ? (aggResult.error || 'Framework version does not support required model feature')
          : (disaggResult.error || 'Framework version does not support required model feature');
        verDetail = [aggResult.detail, disaggResult.detail].filter(Boolean).join('\n\n---\n\n') || verDetail;
      } else if (!hasPass && hasHw) {
        verStatus = 'hw_incompatible';
        verError = aggStatus === 'hw_incompatible'
          ? (aggResult.error || 'Hardware is incompatible with model datatype')
          : (disaggResult.error || 'Hardware is incompatible with model datatype');
        verDetail = [aggResult.detail, disaggResult.detail].filter(Boolean).join('\n\n---\n\n') || verDetail;
      }
    }

    if (verStatus === 'pass') passVersions.push(version);
    else if (verStatus === 'partial') partialVersions.push(version);
    else if (verStatus === 'framework_unsupported') frameworkUnsupportedVersions.push(version);
    else if (verStatus === 'hw_incompatible') hwVersions.push(version);
    else failVersions.push(version);

    if (verError) {
      errorEntries.push({ version, message: `[${version}] ${verError}` });
    }
    if (verDetail) {
      detailEntries.push({ version, message: `[${version}]\n${verDetail}` });
    }
  }

  if (!passVersions.length && !partialVersions.length && !failVersions.length && !hwVersions.length && !frameworkUnsupportedVersions.length) {
    const detail = missingRowDetails(modelId, system, backend, versions, modeFilter);
    return {
      status: 'missing',
      passVersions: [],
      partialVersions: [],
      failVersions: [],
      frameworkUnsupportedVersions: [],
      hwVersions: [],
      error: null,
      detail,
    };
  }

  // Color is driven by the **latest tested version** for this (model, backend):
  //   - every tested version fully passes     -> dark green
  //   - latest passes but older versions have issues -> light green
  //   - only an older version passes          -> blue
  //   - latest has partial support only       -> orange
  //   - everything failed                     -> red
  //   - latest is framework-unsupported       -> violet
  //   - latest is hardware-incompatible       -> gray
  const sortDesc = (a, b) => compareVersionTuples(versionSortKey(b), versionSortKey(a));
  const allTested = [
    ...passVersions,
    ...partialVersions,
    ...failVersions,
    ...frameworkUnsupportedVersions,
    ...hwVersions,
  ].sort(sortDesc);
  const newest = allTested[0];
  let status;
  if (passVersions.includes(newest)) {
    status = passVersions.length === allTested.length
      ? 'pass'
      : 'latest_pass_with_older_issues';
  }
  else if (passVersions.length) {
    status = 'older_pass_only';
  }
  else if (frameworkUnsupportedVersions.includes(newest)) status = 'framework_unsupported';
  else if (hwVersions.includes(newest)) status = 'hw_incompatible';
  else if (partialVersions.includes(newest)) status = 'partial';
  else if (partialVersions.length) status = 'partial';
  else status = 'fail';

  return {
    status,
    passVersions: passVersions.slice().sort(sortDesc),
    partialVersions: partialVersions.slice().sort(sortDesc),
    failVersions: failVersions.slice().sort(sortDesc),
    frameworkUnsupportedVersions: frameworkUnsupportedVersions.slice().sort(sortDesc),
    hwVersions: hwVersions.slice().sort(sortDesc),
    error: errorEntries.length
      ? errorEntries
        .slice()
        .sort((a, b) => compareVersionTuples(versionSortKey(b.version), versionSortKey(a.version)))
        .map(e => e.message)
        .join('\n')
      : null,
    detail: detailEntries.length
      ? detailEntries
        .slice()
        .sort((a, b) => compareVersionTuples(versionSortKey(b.version), versionSortKey(a.version)))
        .map(e => e.message)
        .join('\n\n---\n\n')
      : null,
  };
}

function buildMatrixForMode(rows, systemName, modeFilter) {
  let subset = rows.filter(r => r.System === systemName);
  if (modeFilter !== 'all') subset = subset.filter(r => r.Mode === modeFilter);
  if (!subset.length) return { matrixRows: [], columns: [] };

  const models = [...new Set(subset.map(r => r.HuggingFaceID))].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));

  // Columns are one-per-backend; each carries the sorted list of versions
  // tested for this system/mode. The cell aggregator consults that list.
  const backendVersionSet = {};
  for (const r of subset) {
    if (!backendVersionSet[r.Backend]) backendVersionSet[r.Backend] = new Set();
    backendVersionSet[r.Backend].add(r.Version);
  }
  const sortAsc = (a, b) => compareVersionTuples(versionSortKey(a), versionSortKey(b));
  const columns = Object.keys(backendVersionSet)
    .sort()
    .map(backend => ({
      key: backend,
      backend,
      versions: [...backendVersionSet[backend]].sort(sortAsc),
    }));

  const matrixRows = models.map(model => {
    const cells = {};
    for (const col of columns) {
      cells[col.key] = aggregateBackendCell(subset, model, systemName, col.backend, col.versions, modeFilter);
    }
    return { model, cells };
  });

  return { matrixRows, columns };
}

function buildTopErrors(rows, systemName, modeFilter, topN = 10) {
  let subset = rows.filter(r => r.System === systemName && r.Status === 'FAIL');
  if (modeFilter !== 'all') subset = subset.filter(r => r.Mode === modeFilter);
  if (!subset.length) return [];

  const counts = {};
  for (const row of subset) {
    const sig = extractErrorSignature(row.ErrMsg || '');
    counts[sig] = (counts[sig] || 0) + 1;
  }
  return Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, topN)
    .map(([signature, count]) => ({ signature, count }));
}

function isLocalPreview() {
  return ['localhost', '127.0.0.1', '0.0.0.0'].includes(window.location.hostname);
}

function rawUrl(branch, path) {
  if (isLocalPreview()) return `/${path}?localPreviewTs=${Date.now()}`;
  return `https://raw.githubusercontent.com/${REPO}/refs/heads/${branch}/${path}`;
}

function readSearchQuery() {
  return new URLSearchParams(window.location.search).get('q') || '';
}

function writeSearchQuery(query) {
  const params = new URLSearchParams(window.location.search);
  const normalized = query.trim();
  if (normalized) {
    params.set('q', normalized);
  } else {
    params.delete('q');
  }

  const nextSearch = params.toString();
  const nextUrl = `${window.location.pathname}${nextSearch ? `?${nextSearch}` : ''}${window.location.hash}`;
  const currentUrl = `${window.location.pathname}${window.location.search}${window.location.hash}`;
  if (nextUrl !== currentUrl) {
    window.history.replaceState(null, '', nextUrl);
  }
}

const HARDCODED_RELEASE_BRANCHES = [
  'release/0.8.0',
  'release/0.7.0',
];
const BRANCH_CACHE_KEY = 'sm-release-branches';
const BRANCH_CACHE_TTL = 3600000; // 1 hour
const MIN_VERSION = [0, 7, 0, 0, 0, 0, 0];

function filterAndSortBranches(names) {
  return names
    .filter(n => /^release\/[\d]/.test(n))
    .filter(n => compareVersionTuples(parseVersionTuple(n.replace('release/', '')), MIN_VERSION) >= 0)
    .sort((a, b) => {
      const va = parseVersionTuple(a.replace('release/', ''));
      const vb = parseVersionTuple(b.replace('release/', ''));
      return compareVersionTuples(vb, va);
    });
}

async function fetchBranchList() {
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/git/matching-refs/heads/release/`);
    if (res.ok) {
      const refs = await res.json();
      const branches = filterAndSortBranches(refs.map(r => r.ref.replace('refs/heads/', '')));
      if (branches.length > 0) {
        localStorage.setItem(BRANCH_CACHE_KEY, JSON.stringify({ branches, ts: Date.now() }));
        return { branches, source: 'api' };
      }
    }
    if (res.status === 403 || res.status === 429) {
      throw new Error('rate_limited');
    }
    throw new Error(`HTTP ${res.status}`);
  } catch (err) {
    const warning = err.message === 'rate_limited'
      ? 'GitHub API rate limited. Branch list may be outdated.'
      : 'Could not fetch branch list.';

    const cached = localStorage.getItem(BRANCH_CACHE_KEY);
    if (cached) {
      try {
        const { branches } = JSON.parse(cached);
        if (branches.length > 0) return { branches, source: 'cache', warning };
      } catch {}
    }

    return { branches: filterAndSortBranches(HARDCODED_RELEASE_BRANCHES), source: 'hardcoded', warning };
  }
}

async function fetchOneCsv(branch, path) {
  const res = await fetch(rawUrl(branch, path), { cache: isLocalPreview() ? 'no-store' : 'default' });
  if (!res.ok) throw new Error(`Failed to fetch CSV (HTTP ${res.status}) from branch "${branch}"`);
  const text = await res.text();
  // Support generated updates that mix historical CRLF rows with LF rows.
  const normalizedText = text.replace(/\r\n?/g, '\n');
  const result = Papa.parse(normalizedText, { header: true, skipEmptyLines: true });
  return result.data;
}

async function fetchCsv(branch) {
  for (const supportMatrixPath of SUPPORT_MATRIX_PATHS) {
    const indexPath = `${supportMatrixPath}/index.json`;
    const indexRes = await fetch(rawUrl(branch, indexPath), { cache: isLocalPreview() ? 'no-store' : 'default' });
    if (indexRes.status === 404) continue;
    if (!indexRes.ok) {
      throw new Error(`Failed to fetch support matrix index (HTTP ${indexRes.status}) from branch "${branch}"`);
    }

    const index = await indexRes.json();
    const files = Array.isArray(index.files) ? index.files : [];
    if (!files.length) throw new Error(`Support matrix index is empty on branch "${branch}"`);

    const chunks = await Promise.all(
      files.map(file => fetchOneCsv(branch, `${supportMatrixPath}/${file}`))
    );
    return chunks.flat();
  }

  return fetchOneCsv(branch, LEGACY_CSV_PATH);
}

function MatrixTable({ matrixRows, columns, searchQuery, sortCol, sortAsc, showAllVersions, onSort, onCellClick }) {
  const [hoverTip, setHoverTip] = useState(null);
  const rowNumberColumnWidth = 56;
  const modelColumnWidth = 360;
  const backendColumnWidth = 184;
  const tableMinWidth = rowNumberColumnWidth + modelColumnWidth + columns.length * backendColumnWidth;

  const showTooltip = useCallback((event, text, placement = 'bottom') => {
    if (!text) return;
    const rect = event.currentTarget.getBoundingClientRect();
    const margin = 12;
    const gap = 8;
    const viewportWidth = window.innerWidth || document.documentElement.clientWidth;
    const viewportHeight = window.innerHeight || document.documentElement.clientHeight;
    const width = Math.min(520, Math.max(0, viewportWidth - margin * 2));
    const maxLeft = Math.max(margin, viewportWidth - width - margin);
    const left = Math.min(
      Math.max(rect.left + rect.width / 2 - width / 2, margin),
      maxLeft,
    );
    const availableAbove = rect.top - margin - gap;
    const availableBelow = viewportHeight - rect.bottom - margin - gap;
    const useAbove = placement === 'top'
      ? availableAbove >= 96 || availableAbove >= availableBelow
      : availableBelow < 120 && availableAbove > availableBelow;
    const maxHeight = Math.max(96, Math.min(420, useAbove ? availableAbove : availableBelow));
    const style = {
      left: `${left}px`,
      width: `${width}px`,
      maxHeight: `${maxHeight}px`,
    };
    if (useAbove) style.bottom = `${Math.max(margin, viewportHeight - rect.top + gap)}px`;
    else style.top = `${Math.max(margin, Math.min(rect.bottom + gap, viewportHeight - margin - maxHeight))}px`;
    setHoverTip({ text, style });
  }, []);

  const hideTooltip = useCallback(() => setHoverTip(null), []);
  const tooltipHandlers = (text, placement) => ({
    onMouseEnter: (event) => showTooltip(event, text, placement),
    onMouseLeave: hideTooltip,
    onFocus: (event) => showTooltip(event, text, placement),
    onBlur: hideTooltip,
  });

  let filtered = matrixRows;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = matrixRows.filter(r => r.model.toLowerCase().includes(q));
  }

  // Sort by status rank first (all-pass < latest-pass < older-pass-only <
  // partial < fail < framework-unsupported < hardware-incompatible < missing), then by
  // the concatenated version lists so rows with the same status cluster by
  // their supported-version set.
  const STATUS_RANK = {
    pass: 0,
    latest_pass_with_older_issues: 1,
    older_pass_only: 2,
    partial: 3,
    fail: 4,
    framework_unsupported: 5,
    hw_incompatible: 6,
    missing: 7,
  };
  const cellSortKey = (c) => {
    if (!c) return '99|';
    const versions = (c.passVersions || []).concat(
      c.partialVersions || [],
      c.failVersions || [],
      c.frameworkUnsupportedVersions || [],
      c.hwVersions || [],
    ).join(',');
    return String(STATUS_RANK[c.status] ?? 99) + '|' + versions;
  };

  if (sortCol !== null) {
    filtered = [...filtered].sort((a, b) => {
      let va, vb;
      if (sortCol === 'model') { va = a.model; vb = b.model; }
      else { va = cellSortKey(a.cells[sortCol]); vb = cellSortKey(b.cells[sortCol]); }
      if (va === vb) return 0;
      return sortAsc ? (va < vb ? -1 : 1) : (va > vb ? -1 : 1);
    });
  }

  if (!matrixRows.length) {
    return <div className="py-8 text-center text-slate-400 italic">No data for this system / mode combination.</div>;
  }
  if (!filtered.length) {
    return <div className="py-8 text-center text-slate-400 italic">No models match your search.</div>;
  }

  const cellClass = (status) => {
    switch (status) {
      case 'pass': return 'bg-green-300 dark:bg-green-900 text-green-950 dark:text-white font-semibold cursor-pointer hover:brightness-95 dark:hover:brightness-125';
      case 'latest_pass_with_older_issues': return 'bg-green-200 dark:bg-green-950 text-green-900 dark:text-green-300 font-medium cursor-pointer hover:brightness-95 dark:hover:brightness-125';
      case 'older_pass_only': return 'bg-sky-200 dark:bg-sky-950 text-sky-900 dark:text-sky-300 font-medium cursor-pointer hover:brightness-95 dark:hover:brightness-125';
      case 'partial': return 'bg-amber-200 dark:bg-amber-950 text-amber-900 dark:text-amber-300 font-medium cursor-pointer hover:brightness-95 dark:hover:brightness-125';
      case 'fail': return 'bg-red-200 dark:bg-red-950 text-red-800 dark:text-red-300 font-semibold cursor-pointer hover:brightness-95 dark:hover:brightness-125';
      case 'framework_unsupported': return 'bg-violet-200 dark:bg-violet-950 text-violet-900 dark:text-violet-300 font-medium cursor-pointer hover:brightness-95 dark:hover:brightness-125';
      case 'hw_incompatible': return 'bg-slate-300 dark:bg-slate-700 text-slate-700 dark:text-slate-300 font-medium cursor-pointer hover:brightness-95 dark:hover:brightness-125';
      default: return '';
    }
  };

  // Render the version chips inside a cell.
  //
  //   showAllVersions = true  -> every tested version: pass plain, partial
  //                              with leading `~`, fail with strikethrough.
  //   showAllVersions = false -> just the latest tested version, styled the
  //                              same way based on which bucket it came from.
  const renderChips = (cell) => {
    const chips = [];
    const pushPass = (v) => chips.push(<span key={`p-${v}`}>{v}</span>);
    const pushPartial = (v) => chips.push(<span key={`m-${v}`} title="Partial (agg or disagg only)">~{v}</span>);
    const pushFail = (v) => chips.push(<span key={`f-${v}`} className="line-through opacity-75">{v}</span>);
    const pushFrameworkUnsupported = (v) => chips.push(<span key={`u-${v}`} title="Framework unsupported" className="opacity-80">F{v}</span>);
    const pushHw = (v) => chips.push(<span key={`h-${v}`} title="Hardware incompatible" className="opacity-80">!{v}</span>);

    if (showAllVersions) {
      const all = [
        ...(cell.passVersions || []).map(v => ({ version: v, status: 'pass' })),
        ...(cell.partialVersions || []).map(v => ({ version: v, status: 'partial' })),
        ...(cell.failVersions || []).map(v => ({ version: v, status: 'fail' })),
        ...(cell.frameworkUnsupportedVersions || []).map(v => ({ version: v, status: 'framework_unsupported' })),
        ...(cell.hwVersions || []).map(v => ({ version: v, status: 'hw_incompatible' })),
      ].sort((a, b) => compareVersionTuples(versionSortKey(a.version), versionSortKey(b.version)));
      all.forEach(({ version, status }) => {
        if (status === 'pass') pushPass(version);
        else if (status === 'partial') pushPartial(version);
        else if (status === 'framework_unsupported') pushFrameworkUnsupported(version);
        else if (status === 'hw_incompatible') pushHw(version);
        else pushFail(version);
      });
    } else {
      // Each per-status list is already newest-first (sorted in aggregateBackendCell).
      // Pick whichever bucket the overall status points at.
      if (
        (cell.status === 'pass' || cell.status === 'latest_pass_with_older_issues' || cell.status === 'older_pass_only')
        && cell.passVersions && cell.passVersions.length
      ) {
        pushPass(cell.passVersions[0]);
      } else if (cell.status === 'partial') {
        const brokenVersions = [
          ...(cell.partialVersions || []).map(v => ({ version: v, kind: 'partial' })),
          ...(cell.failVersions || []).map(v => ({ version: v, kind: 'fail' })),
        ].sort((a, b) => compareVersionTuples(versionSortKey(b.version), versionSortKey(a.version)));
        const latestBroken = brokenVersions[0];
        if (latestBroken?.kind === 'fail') pushFail(latestBroken.version);
        else if (latestBroken) pushPartial(latestBroken.version);
        else if (cell.partialVersions && cell.partialVersions.length) pushPartial(cell.partialVersions[0]);
      } else if (cell.status === 'fail') {
        if (cell.failVersions && cell.failVersions.length) pushFail(cell.failVersions[0]);
        else if (cell.partialVersions && cell.partialVersions.length) pushPartial(cell.partialVersions[0]);
      } else if (cell.status === 'framework_unsupported') {
        if (cell.frameworkUnsupportedVersions && cell.frameworkUnsupportedVersions.length) {
          pushFrameworkUnsupported(cell.frameworkUnsupportedVersions[0]);
        }
      } else if (cell.status === 'hw_incompatible') {
        if (cell.hwVersions && cell.hwVersions.length) pushHw(cell.hwVersions[0]);
      }
    }
    return <span className="inline-flex flex-wrap gap-x-2 gap-y-0.5 font-mono text-xs">{chips}</span>;
  };

  return (
    <React.Fragment>
    <div className="overflow-x-auto mb-6 rounded-lg border border-slate-200 dark:border-slate-700 scrollbar-thin" onScroll={hideTooltip}>
      <table className="w-full text-sm border-collapse table-fixed" style={{ minWidth: `${tableMinWidth}px` }}>
        <colgroup>
          <col style={{ width: `${rowNumberColumnWidth}px` }} />
          <col style={{ width: `${modelColumnWidth}px` }} />
          {columns.map(c => (
            <col key={c.key} style={{ width: `${backendColumnWidth}px` }} />
          ))}
        </colgroup>
        <thead>
          <tr>
            <th className="bg-slate-50 dark:bg-slate-800 sticky top-0 z-10 px-3 py-2 text-right font-bold
                  border-b-2 border-slate-200 dark:border-slate-600 whitespace-nowrap text-slate-500 dark:text-slate-400">
              No.
            </th>
            <th onClick={() => onSort('model')}
                className={`bg-slate-50 dark:bg-slate-800 sticky top-0 z-10 px-3 py-2 text-left font-bold
                  border-b-2 border-slate-200 dark:border-slate-600 cursor-pointer select-none whitespace-nowrap
                  hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors
                  ${sortCol === 'model' ? 'text-indigo-600 dark:text-indigo-400' : ''}`}>
              HuggingFace ID <SortArrow col="model" sortCol={sortCol} sortAsc={sortAsc} />
            </th>
            {columns.map(c => (
              <th key={c.key} onClick={() => onSort(c.key)}
                  className={`bg-slate-50 dark:bg-slate-800 sticky top-0 z-10 px-3 py-2 text-left font-bold
                    border-b-2 border-slate-200 dark:border-slate-600 cursor-pointer select-none
                    hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors
                    ${sortCol === c.key ? 'text-indigo-600 dark:text-indigo-400' : ''}`}>
                <div className="flex items-start gap-1 min-w-0">
                  <span className="shrink-0">{c.backend}</span>
                  {c.versions.length > 1 && (
                    <small className="font-normal text-slate-400 truncate min-w-0">({c.versions.join(', ')})</small>
                  )}
                  <span className="shrink-0"><SortArrow col={c.key} sortCol={sortCol} sortAsc={sortAsc} /></span>
                </div>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {filtered.map((row, index) => {
            const tipPlacement = index >= Math.max(filtered.length - 6, 0) ? 'top' : 'bottom';
            return (
            <tr key={row.model} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/50 transition-colors">
              <td className="px-3 py-2 border-b border-slate-200 dark:border-slate-700 text-right text-slate-500 dark:text-slate-400 tabular-nums">
                {index + 1}
              </td>
              <td className="px-3 py-2 border-b border-slate-200 dark:border-slate-700 font-medium max-w-xs overflow-hidden text-ellipsis whitespace-nowrap"
                  title={row.model}>
                {row.model}
              </td>
              {columns.map(c => {
                const cell = row.cells[c.key];
                if (!cell || cell.status === 'missing') {
                  const detail = cell?.detail || `${c.backend}: not tested`;
                  const displayTooltip = `${c.backend}: not tested\n\nClick to keep this open and copy it.`;
                  return (
                    <td key={c.key}
                        {...tooltipHandlers(displayTooltip, tipPlacement)}
                        onClick={() => {
                          hideTooltip();
                          onCellClick(row.model, c.backend, detail);
                        }}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            hideTooltip();
                            onCellClick(row.model, c.backend, detail);
                          }
                        }}
                        role="button"
                        tabIndex={0}
                        aria-label={displayTooltip}
                        className="px-3 py-2 border-b border-slate-200 dark:border-slate-700 text-slate-400 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800">
                      &mdash;
                    </td>
                  );
                }
                const detail = cell.detail || cell.error;
                const clickable = Boolean(detail);
                // Native browser tooltip with the full version breakdown so the
                // user can always inspect all versions regardless of the
                // "Show all versions" toggle.
                const tooltipParts = [];
                if (cell.passVersions && cell.passVersions.length) tooltipParts.push(`Pass: ${cell.passVersions.join(', ')}`);
                if (cell.partialVersions && cell.partialVersions.length) tooltipParts.push(`Partial: ${cell.partialVersions.join(', ')}`);
                if (cell.failVersions && cell.failVersions.length) tooltipParts.push(`Fail: ${cell.failVersions.join(', ')}`);
                if (cell.frameworkUnsupportedVersions && cell.frameworkUnsupportedVersions.length) tooltipParts.push(`Framework unsupported: ${cell.frameworkUnsupportedVersions.join(', ')}`);
                if (cell.hwVersions && cell.hwVersions.length) tooltipParts.push(`Hardware incompatible: ${cell.hwVersions.join(', ')}`);
                const tooltip = cell.status === 'framework_unsupported'
                  ? (cell.error || 'Framework version does not support required model feature')
                  : cell.status === 'hw_incompatible'
                    ? (cell.error || 'Hardware is incompatible with model datatype')
                    : `${c.backend}\n${tooltipParts.join('\n')}`;
                const displayTooltip = clickable ? `${tooltip}\n\nClick to keep this open and copy the command.` : tooltip;
                return (
                  <td key={c.key}
                      {...tooltipHandlers(displayTooltip, tipPlacement)}
                      onClick={clickable ? () => {
                        hideTooltip();
                        onCellClick(row.model, c.backend, detail);
                      } : undefined}
                      onKeyDown={clickable ? (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                          e.preventDefault();
                          hideTooltip();
                          onCellClick(row.model, c.backend, detail);
                        }
                      } : undefined}
                      role={clickable ? 'button' : undefined}
                      tabIndex={clickable ? 0 : undefined}
                      aria-label={clickable ? `Open support details for ${row.model} on ${c.backend}` : undefined}
                      className={`px-3 py-2 border-b border-slate-200 dark:border-slate-700 ${cellClass(cell.status)}`}>
                    {renderChips(cell)}
                  </td>
                );
              })}
            </tr>
          );
          })}
        </tbody>
      </table>
    </div>
    <FloatingTooltip tip={hoverTip} />
    </React.Fragment>
  );
}

function parseSupportDetailSections(text) {
  return text
    .split(/\n\s*---\s*\n/)
    .map(chunk => chunk.trim())
    .filter(Boolean)
    .map((raw, index) => {
      const lines = raw.split('\n');
      let headingVersion = null;
      const firstLine = (lines[0] || '').trim();
      if (/^\[[^\]]+\]$/.test(firstLine)) {
        headingVersion = firstLine.slice(1, -1);
        lines.shift();
      }

      const section = {
        raw,
        index,
        headingVersion,
        mode: null,
        status: null,
        version: null,
        command: null,
        details: null,
      };
      let block = null;
      const commandLines = [];
      const detailLines = [];

      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed === 'Command:') {
          block = 'command';
          continue;
        }
        if (trimmed === 'Details:') {
          block = 'details';
          continue;
        }

        if (block === 'command') {
          commandLines.push(line);
          continue;
        }
        if (block === 'details') {
          detailLines.push(line);
          continue;
        }

        const fieldMatch = line.match(/^(Mode|Status|Version):\s*(.*)$/);
        if (fieldMatch) {
          section[fieldMatch[1].toLowerCase()] = fieldMatch[2].trim();
        }
      }

      section.command = commandLines.join('\n').trim() || null;
      section.details = detailLines.join('\n').trim() || null;
      section.version = section.version || headingVersion;
      return section;
    });
}

function copyText(text, done) {
  const copyWithTextarea = () => {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(done)
      .catch(() => {
        copyWithTextarea();
        done();
      });
    return;
  }
  copyWithTextarea();
  done();
}

    : normalized === 'HW_INCOMPATIBLE'
      ? 'bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-200'
      : normalized === 'FAIL'
        ? 'bg-red-100 text-red-700 dark:bg-red-950 dark:text-red-300'
        : 'bg-violet-100 text-violet-700 dark:bg-violet-950 dark:text-violet-300';
  return (
    <span className={`px-2 py-0.5 rounded text-[0.68rem] font-bold tracking-wide ${badgeClass}`}>
      {normalized}
    </span>
  );
}

        <pre className="mt-2 whitespace-pre-wrap break-words font-mono text-xs leading-relaxed bg-slate-50 dark:bg-slate-900 p-3 rounded border border-slate-200 dark:border-slate-700">

      </details>
    </div>
  );
}

function ErrorModal({ model, system, backend, error, onClose }) {
  const [copied, setCopied] = useState(false);
  if (!error) return null;
  const formatted = error.replace(/\\\\n/g, '\n').replace(/\\n/g, '\n');
  const showFixLink = /Status: (FAIL|HW_INCOMPATIBLE|FRAMEWORK_INCOMPATIBLE)/.test(formatted) || formatted.includes('No support-matrix row exists');
  const issueUrl = buildCallForFixUrl(model, system, backend, formatted);
  const copyError = () => {
    const done = () => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1400);
    };
    copyText(formatted, done);
  };
  return (
    <div className="fixed inset-0 bg-black/50 z-[1000] flex items-center justify-center p-6" onClick={onClose}>
      <div className="bg-white dark:bg-slate-800 rounded-lg max-w-3xl w-full max-h-[85vh] flex flex-col shadow-2xl"

                       text-slate-700 dark:text-slate-200 text-xs font-semibold rounded transition-colors whitespace-nowrap">
            {copied ? 'Copied' : 'Copy'}
          </button>
          {showFixLink && (
            <a href={issueUrl} target="_blank" rel="noopener"
              className="px-3 py-1.5 bg-indigo-500 hover:bg-indigo-600 dark:bg-indigo-400 dark:hover:bg-indigo-500
                         text-white text-xs font-semibold rounded transition-colors no-underline whitespace-nowrap">
              Call for Fix
            </a>
          )}
          <button onClick={onClose}
            className="bg-transparent border-none text-xl cursor-pointer text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 px-1 rounded transition-colors">

  );
}

// ── App ─────────────────────────────────────────────────────────────

function App() {
  const [branch, setBranch] = useState('main');
  const [releaseBranches, setReleaseBranches] = useState([]);
  const [branchesLoading, setBranchesLoading] = useState(true);
  const [branchWarning, setBranchWarning] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [csvRows, setCsvRows] = useState([]);

  const [activeSystem, setActiveSystem] = useState(null);
  const [activeMode, setActiveMode] = useState('all');
  const [searchQuery, setSearchQuery] = useState(readSearchQuery);
  const [sortCol, setSortCol] = useState(null);
  const [sortAsc, setSortAsc] = useState(true);
  const [showAllVersions, setShowAllVersions] = useState(false);

  const [modal, setModal] = useState(null);

  useEffect(() => {
    fetchBranchList()
      .then(({ branches, warning }) => {
        setReleaseBranches(branches);
        setBranchWarning(warning || null);
      })
      .catch(() => {
        setReleaseBranches(filterAndSortBranches(HARDCODED_RELEASE_BRANCHES));
        setBranchWarning('Could not fetch branch list.');
      })
      .finally(() => setBranchesLoading(false));
  }, []);

  const loadCsv = useCallback((branchName) => {
    setLoading(true);
    setError(null);
    setBranch(branchName);
    fetchCsv(branchName)
      .then(rows => {
        setCsvRows(rows);
        const systems = sortSystems([...new Set(rows.map(r => r.System))]);
        if (systems.includes(PREFERRED_DEFAULT_SYSTEM)) {
          setActiveSystem(PREFERRED_DEFAULT_SYSTEM);
        } else {
          setActiveSystem(systems[0] || null);
        }
        setSortCol(null);
        setSortAsc(true);
        setSearchQuery(readSearchQuery());
      })
      .catch(err => setError(err.message))
      .finally(() => setLoading(false));
  }, []);

  useEffect(() => { loadCsv('main'); }, [loadCsv]);

  const systems = useMemo(() => sortSystems([...new Set(csvRows.map(r => r.System))]), [csvRows]);
  const totalPass = useMemo(() => csvRows.filter(r => r.Status === 'PASS').length, [csvRows]);
  const totalFail = useMemo(() => csvRows.filter(r => r.Status === 'FAIL').length, [csvRows]);

  const { matrixRows, columns } = useMemo(
    () => activeSystem ? buildMatrixForMode(csvRows, activeSystem, activeMode) : { matrixRows: [], columns: [] },
    [csvRows, activeSystem, activeMode]
  );

  const topErrors = useMemo(
    () => activeSystem ? buildTopErrors(csvRows, activeSystem, activeMode) : [],
    [csvRows, activeSystem, activeMode]
  );

  const handleSort = useCallback((col) => {
    setSortCol(prev => {
      if (prev === col) { setSortAsc(a => !a); return col; }
      setSortAsc(true);
      return col;
    });
  }, []);

  const handleSelectSystem = useCallback((sys) => {
    setActiveSystem(sys);
    setSortCol(null);
    setSortAsc(true);
  }, []);

  const handleSelectBranch = useCallback((branchName) => {
    if (branchName !== branch) loadCsv(branchName);
  }, [branch, loadCsv]);

  const handleSetSearchQuery = useCallback((query) => {
    setSearchQuery(query);
    writeSearchQuery(query);
  }, []);

  useEffect(() => {
    const handler = () => setSearchQuery(readSearchQuery());
    window.addEventListener('popstate', handler);
    return () => window.removeEventListener('popstate', handler);
  }, []);

  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') setModal(null); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, []);

  return (
    <>
      <Header
        activeBranch={branch}
        onSelectBranch={handleSelectBranch}
        releaseBranches={releaseBranches}
        branchesLoading={branchesLoading}
        branchWarning={branchWarning}
      />

      {error && <ErrorBanner message={error} onRetry={() => loadCsv(branch)} />}

      {loading ? <LoadingSpinner /> : !error && (
        <>
          <Controls
            activeMode={activeMode} onSetMode={(m) => { setActiveMode(m); setSortCol(null); setSortAsc(true); }}
            searchQuery={searchQuery} onSetSearch={handleSetSearchQuery}
            totalPass={totalPass} totalFail={totalFail}
            showAllVersions={showAllVersions} onToggleShowAllVersions={setShowAllVersions}
          />
          <SystemTabs systems={systems} activeSystem={activeSystem} onSelectSystem={handleSelectSystem} />
          <div className="max-w-[1600px] mx-auto p-6">
            <Legend />
            <MatrixTable
              matrixRows={matrixRows} columns={columns}
              searchQuery={searchQuery} sortCol={sortCol} sortAsc={sortAsc}
              showAllVersions={showAllVersions}
              onSort={handleSort}
              onCellClick={(model, backend, err) => setModal({ model, system: activeSystem, backend, error: err })}
            />
            <TopErrors errors={topErrors} />
          </div>
        </>
      )}

      <Footer />

      {modal && (
        <ErrorModal
          model={modal.model} system={modal.system} backend={modal.backend} error={modal.error}
          onClose={() => setModal(null)}
        />
      )}
    </>
  );
}

// ── Mount ───────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
