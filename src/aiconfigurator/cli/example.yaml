# ----------------------------------------------------------------------------
# Canonical task config for `aiconfigurator cli exp --yaml-path ...`.
#
# Flat V2 schema: every key maps 1:1 to a field on sdk.task.Task -- no
# `config:` block, no `worker_config:` subsections, no `mode`/`profiles`.
#
# The legacy V1 format (top-level model_path shared across roles, nested
# worker_config / replica_config / advanced_tuning_config) is deprecated:
# it still loads (auto-converted, with a DeprecationWarning) but new configs
# should use this flat style.  See example_v1_deprecated.yaml for the old shape.
# ----------------------------------------------------------------------------


# ============================================================
# Aggregated (single-pool IFB) — minimal
# ============================================================
agg_minimal:
  serving_mode: agg
  model_path: deepseek-ai/DeepSeek-V3
  system_name: h200_sxm
  total_gpus: 8

  # All of the following are optional with sensible defaults / HF inference.
  # backend_name: trtllm            # default
  # backend_version: 1.3.0rc10      # auto-resolved to latest
  # isl: 4000
  # osl: 1000
  # ttft: 1000.0
  # tpot: 50.0


# ============================================================
# Aggregated — full control
# ============================================================
agg_full:
  serving_mode: agg

  # Workload + SLA
  isl: 4000
  osl: 1000
  prefix: 0
  ttft: 1000.0
  tpot: 40.0
  total_gpus: 8
  database_mode: SILICON
  # Fine-grained HYBRID/EMPIRICAL transfer control (ignored in SILICON). Preset
  # off|conservative|balanced|aggressive, or comma-separated kinds
  # (xshape,xquant,xprofile,xop). Default: all kinds on.
  transfer_policy: aggressive

  # Worker spec
  model_path: deepseek-ai/DeepSeek-V3
  system_name: h200_sxm
  backend_name: trtllm
  backend_version: 1.2.0rc5
  enable_wideep: false
  enable_chunked_prefill: false
  enable_eplb: false
  moe_backend: null

  # Speculative decoding: never auto-enabled. nextn = draft length,
  # nextn_accepted = average accepted draft tokens per step (required when nextn > 0).
  nextn: 1
  nextn_accepted: 0.85

  # Quantization override.
  # Default behavior: each mode is inferred from the model's HF config
  # (quant_algo, kv_cache_quant_algo).  Set any *_quant_mode field below to override.
  gemm_quant_mode: fp8_block
  moe_quant_mode: fp8_block
  kvcache_quant_mode: bfloat16
  fmha_quant_mode: bfloat16
  comm_quant_mode: half

  # Search space (auto-defaulted per backend/system/wideep if omitted)
  agg_num_gpu_candidates: [4, 8]
  agg_tp_candidates: [1, 2, 4, 8]
  agg_pp_candidates: [1]
  agg_dp_candidates: [1, 2, 4, 8]
  agg_moe_tp_candidates: [1]
  agg_moe_ep_candidates: [1, 2, 4, 8]


# ============================================================
# Disaggregated (P/D split) — minimal
# ============================================================
disagg_minimal:
  serving_mode: disagg
  total_gpus: 32

  # Prefill role
  prefill_model_path: deepseek-ai/DeepSeek-V3
  prefill_system_name: h200_sxm

  # Decode role
  decode_model_path: deepseek-ai/DeepSeek-V3
  decode_system_name: h200_sxm


# ============================================================
# Disaggregated — full control
# ============================================================
disagg_full:
  serving_mode: disagg

  # Workload + SLA (shared across roles)
  isl: 4000
  osl: 1000
  ttft: 1000.0
  tpot: 40.0
  total_gpus: 32

  # Speculative decoding (shared): never auto-enabled. nextn = draft length,
  # nextn_accepted = average accepted draft tokens per step (required when nextn > 0).
  nextn: 1
  nextn_accepted: 0.85

  # MoE communication backend (shared; e.g. "deepep_moe" for SGLang WideEP).
  moe_backend: null

  # --- Prefill worker spec ---
  prefill_model_path: deepseek-ai/DeepSeek-V3
  prefill_system_name: h200_sxm
  prefill_backend_name: trtllm
  prefill_backend_version: 1.2.0rc5
  prefill_enable_wideep: false
  prefill_enable_chunked_prefill: false
  prefill_enable_eplb: false

  # Prefill quantization override (default: infer from HF config)
  prefill_gemm_quant_mode: fp8_block
  prefill_moe_quant_mode: fp8_block
  prefill_kvcache_quant_mode: bfloat16
  prefill_fmha_quant_mode: bfloat16
  prefill_comm_quant_mode: half

  # Prefill search space (auto-defaulted if omitted)
  prefill_num_gpu_candidates: [4, 8]
  prefill_tp_candidates: [1, 2, 4, 8]
  prefill_pp_candidates: [1]
  prefill_dp_candidates: [1]
  prefill_moe_tp_candidates: [1]
  prefill_moe_ep_candidates: [1, 2, 4, 8]

  # --- Decode worker spec ---
  # Note: chunked prefill is a prefill-phase concept; decode-only workers
  # do not have a corresponding flag.
  decode_model_path: deepseek-ai/DeepSeek-V3
  decode_system_name: h200_sxm
  decode_backend_name: trtllm
  decode_backend_version: 1.2.0rc5
  decode_enable_wideep: false
  decode_enable_eplb: false

  # Decode quantization override (default: infer from HF config)
  decode_gemm_quant_mode: fp8_block
  decode_moe_quant_mode: fp8_block
  decode_kvcache_quant_mode: bfloat16
  decode_fmha_quant_mode: bfloat16
  decode_comm_quant_mode: half

  # Decode search space (auto-defaulted if omitted)
  decode_num_gpu_candidates: [4, 8]
  decode_tp_candidates: [1, 2, 4, 8]
  decode_pp_candidates: [1]
  decode_dp_candidates: [1, 2, 4, 8]
  decode_moe_tp_candidates: [1]
  decode_moe_ep_candidates: [1, 2, 4, 8]

  # --- Disagg orchestration ---
  num_gpu_per_replica: [8, 16, 24, 32, 40, 48, 56, 64, 72, 80, 88, 96, 104, 112, 120, 128]
  max_gpu_per_replica: 128
  max_prefill_workers: 32
  max_decode_workers: 32
  prefill_max_batch_size: 1
  decode_max_batch_size: 512

  # Per-phase latency-correction multipliers, applied inside the static
  # disagg scheduler.  Defaults are silicon-calibrated.
  prefill_latency_correction: 1.1
  decode_latency_correction: 1.08

  # Rate-matching degradation factors model the practical P/D throughput
  # loss under (P_workers, D_workers) pairing.  Defaults are silicon-calibrated.
  rate_match_prefill_degradation: 0.9
  rate_match_decode_degradation: 0.92

  # TTFT pre-correction applied to prefill candidates before the SLA filter,
  # modeling queueing-under-concurrency in the deployed system.
  # Used by both the constraint-mode search and ``pick_autoscale``.
  autoscale_ttft_correction_factor: 1.8
