# Flat V2 task schema: one key per Task field, no mode/config/worker_config nesting.
# `exps` lists which experiments to run (in order); each other top-level key is an experiment.

exps:
- gb200_wideep_agg
- gb200_wideep_disagg
- gb200_wideep_eplb_agg
- gb200_wideep_eplb_slots288_agg
- gb200_wideep_eplb_disagg
- gb200_wideep_eplb_slots288_disagg
gb200_wideep_agg:
  isl: 4000
  serving_mode: agg
  total_gpus: 512
  tpot: 40.0
  ttft: 1000.0
  osl: 1000
  nextn: 1
  nextn_accepted: 0.85
  model_path: nvidia/DeepSeek-V3.1-NVFP4
  system_name: gb200
  enable_wideep: true
gb200_wideep_eplb_agg:
  isl: 4000
  serving_mode: agg
  total_gpus: 512
  tpot: 40.0
  ttft: 1000.0
  osl: 1000
  nextn: 1
  nextn_accepted: 0.85
  model_path: deepseek-ai/DeepSeek-V3
  system_name: gb200
  enable_wideep: true
  enable_eplb: true
  gemm_quant_mode: nvfp4
  moe_quant_mode: nvfp4
gb200_wideep_eplb_slots288_agg:
  isl: 4000
  serving_mode: agg
  total_gpus: 512
  tpot: 40.0
  wideep_num_slots: 288
